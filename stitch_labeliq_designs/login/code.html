<style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #131313;
      color: #e5e2e1;

<body class="antialiased overflow-hidden">
<div class="relative min-h-screen flex items-center justify-center lg:justify-start">
<!-- Hero Image Side (Photography-Forward) -->
<div class="absolute inset-0 z-0 hidden lg:block w-3/5">
<img alt="Dark Food Aesthetic" class="h-full w-full object-cover" data-alt="Close-up of vibrant Mediterranean ingredients on a dark stone surface with dramatic side lighting and deep shadows, editorial food photography" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgK6wN9T5MZl3lU-n-3qah7SFGSH-5K4uTonyRpB0Kb05vjZgrJXRoPy3PotlMvJHavlXqUbRL-OYfkDU8ET-1xUbqodV5i0yp_S_OOdjvL_0muGgZTHhzzGHwr3F-JUSZMvQwqjd_OJ-eSxVfTWFxyeoR5a_j-awcHt-6yqEd-ExUsNs9LOL2CrDz-D8QvOEkWB9KulRHsR6zkBjPmECtLe_PkmjUPqcRb5o9cFStwJe7mXuWPT31RAzRXbLhKghwfaQSvJmS0GzZ"/>
<div class="absolute inset-0 image-overlay-gradient"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-8 lg:ml-[10%] xl:ml-[15%]">
<!-- Brand Logo Anchor -->
<div class="mb-10 text-center lg:text-left">
<h1 class="text-3xl font-extrabold tracking-tighter text-[#FF385C]">
          LabelIQ
        </h1>
<p class="text-on-surface-variant text-sm mt-2 font-medium tracking-tight">
          Unlock the secrets behind your food.
        </p>
</div>
<!-- Login Form Section -->
<section class="space-y-6">
<div class="space-y-4">
<!-- Email Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-[#FF385C] transition-all outline-none" placeholder="Email or phone number" type="text"/>
</div>
<!-- Password Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-[#FF385C] transition-all outline-none" placeholder="Password" type="password"/>
</div>
</div>
<!-- Links -->
<div class="flex items-center justify-end">
<a class="text-xs font-bold text-[#FF385C] uppercase tracking-widest hover:opacity-80 transition-opacity" href="#">
            Forgot Password?
          </a>
</div>
<!-- Primary CTA -->
<button class="w-full bg-[#FF385C] text-white font-bold py-4 rounded-xl shadow-[0px_4px_12px_rgba(255,56,92,0.3)] active:scale-95 transition-transform duration-200">
          Login
        </button>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-outline-variant opacity-20"></div>
<span class="text-[10px] font-bold text-outline uppercase tracking-[0.2em]">or continue with</span>
<div class="h-[1px] flex-1 bg-outline-variant opacity-20"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-surface-container-high hover:bg-surface-variant transition-colors py-3.5 rounded-xl border-none">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M12.48 10.92v3.28h7.84c-.24 1.84-.90 3.14-1.64 4.1a10.02 10.02 0 0 1-7.84 3.06 10 10 0 0 1-10-10 10 10 0 0 1 10-10c2.72 0 4.84 1.04 6.3 2.4l2.3-2.3C17.74 1.74 15.04 0 12 0a12 12 0 0 0-12 12 12 12 0 0 0 12 12c3.24 0 5.7-1.06 7.56-2.66a9.42 9.42 0 0 0 2.58-6.66c0-.46-.04-.92-.12-1.36h-10z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="flex items-center justify-center gap-2 bg-surface-container-high hover:bg-surface-variant transition-colors py-3.5 rounded-xl border-none">
<svg class="w-5 h-5 fill-on-surface" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.22 1.67-3.72 1.67-2.6 0-4.63-1.92-4.63-4.54 0-2.62 2.03-4.53 4.63-4.53 1.5 0 2.76.72 3.72 1.67l3.14-3.14c-1.81-1.72-4.22-2.78-6.86-2.78-5.52 0-10 4.48-10 10s4.48 10 10 10c2.64 0 5.05-1.06 6.86-2.78l-3.14-3.14zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path>
<path d="M12.12 10c.8 0 1.56.32 2.12.88l1.41-1.41c-.93-.93-2.2-1.47-3.53-1.47-2.76 0-5 2.24-5 5s2.24 5 5 5c1.33 0 2.6-.54 3.53-1.47l-1.41-1.41c-.56.56-1.32.88-2.12.88-1.66 0-3-1.34-3-3s1.34-3 3-3z"></path>
<path d="M17.5 7.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"></path>
</svg>
<span class="text-sm font-semibold">Apple</span>
</button>
</div>
</section>
<!-- Footer Action -->
<footer class="mt-12 text-center">
<p class="text-sm text-outline font-medium">
          Don't have an account? 
          <a class="text-[#FF385C] font-bold ml-1 hover:underline underline-offset-4" href="#">Sign Up</a>
</p>
</footer>

<!-- Mobile Background Image Overlay (Mobile Only) -->
<div class="absolute inset-0 z-[-1] lg:hidden">
<img alt="Dark Food Aesthetic Mobile" class="h-full w-full object-cover opacity-30" data-alt="Atmospheric dark shot of fresh organic vegetables on a rustic table with soft overhead lighting and deep contrast" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5g8sJdifjS_QNM5VF9hGZuuLLfJUF5pzgEhJ9NR3gaoDyRdbczSXoKLPqxub3KAIMvW0My4dg3QW13VroLcuuT27bfl0aYtPckT7Pi-BRDXz9pviqtr4v5rBkAueXIMmVimkvrUEWFxeaE5Uz4vBoiITtXM77zxoRxUCGRVPX5x3j8-wpuOm_yZiNoBvPEslFc98WZt5fvkci_MOU0_pKJ-MEfRlX_vKx_6ATOkWMlUvEh79FsMKmVION-oyUdLuRF3rYhFJ4Q9HF"/>
<div class="absolute inset-0 bg-gradient-to-b from-[#131313]/80 via-[#131313] to-[#131313]"></div>
</div>

<div class="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden opacity-10">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-[#FF385C] rounded-full blur-[120px]"></div>
<div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-secondary-container rounded-full blur-[160px]"></div>
</div>
